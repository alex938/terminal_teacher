services:
  web:
    build: .
    ports:
      - "7777:7777"
    volumes:
      - db_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_PATH=/app/data/db.sqlite3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7777/healthz/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  db_data:
    driver: local
